<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stranded in Paradise</title>
<meta name="description" content="A tropical island builder game. Get notified when it's playable.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: url('assets/cursor.svg') 1 1, auto !important; }
  @font-face { font-family: 'Tahiti'; src: url('assets/fonts/tahiti.otf') format('opentype'); }
  html, body { overflow: hidden; background: #000; width: 100%; height: 100%; }
  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

  /* ── Landing Overlay ── */
  .landing-overlay {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 62vh;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    padding: 20px;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
  }
  .landing-overlay.exiting {
    transform: translateY(-100%);
    opacity: 0;
  }
  .landing-overlay > * { pointer-events: auto; }

  /* ── Play transition cover ── */
  .play-transition {
    position: fixed;
    inset: 0;
    z-index: 998;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .play-transition.active {
    opacity: 1;
  }

  .landing-title {
    font-family: 'Tahiti', serif;
    font-size: clamp(2.8rem, 10vw, 5.5rem);
    color: #fff;
    text-align: center;
    text-shadow:
      0 2px 20px rgba(0,0,0,0.25),
      0 0 50px rgba(0,0,0,0.12);
    letter-spacing: 0.08em;
    line-height: 1.1;
    width: min(340px, 78vw);
    opacity: 0;
    animation: fadeInUp 1.5s ease-out 0.3s forwards;
  }
  @media (min-width: 520px) {
    .landing-title { width: auto; max-width: 90vw; }
    .mobile-break { display: none; }
  }

  .landing-subtitle {
    font: 400 clamp(0.85rem, 2.5vw, 1.2rem)/1.4 system-ui, -apple-system, sans-serif;
    color: rgba(255,255,255,0.8);
    text-align: center;
    margin-top: 20px;
    text-shadow: 0 1px 10px rgba(0,0,0,0.5);
    opacity: 0;
    animation: fadeInUp 1.2s ease-out 0.8s forwards;
  }

  /* ── Email Form ── */
  .landing-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
    width: min(340px, 78vw);
    opacity: 0;
    animation: fadeInUp 1.2s ease-out 1.2s forwards;
  }
  @media (min-width: 520px) {
    .landing-form { flex-direction: row; width: min(400px, 90vw); gap: 10px; }
  }

  .landing-input {
    flex: 1;
    padding: 10px 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 25px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 400 14px/1 system-ui, -apple-system, sans-serif;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    cursor: url('assets/cursor.svg') 1 1, text !important;
  }
  @media (min-width: 520px) {
    .landing-input { padding: 12px 18px; font-size: 15px; }
  }
  .landing-input::placeholder { color: rgba(255,255,255,0.5); }
  .landing-input:focus {
    border-color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.35);
  }

  .landing-submit {
    padding: 10px 20px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 600 13px/1 system-ui, -apple-system, sans-serif;
    cursor: url('assets/cursor.svg') 1 1, pointer !important;
    transition: all 0.2s;
    white-space: nowrap;
  }
  @media (min-width: 520px) {
    .landing-submit { padding: 12px 24px; font-size: 14px; }
  }
  .landing-submit:hover { background: rgba(255,255,255,0.3); }
  .landing-submit:active { transform: scale(0.96); }
  .landing-submit:disabled {
    opacity: 0.5;
    cursor: url('assets/cursor.svg') 1 1, not-allowed !important;
  }

  /* ── Success / Error Messages ── */
  .landing-success {
    margin-top: 20px;
    padding: 14px 24px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 25px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 400 15px/1.4 system-ui, -apple-system, sans-serif;
    text-align: center;
    animation: fadeInUp 0.6s ease-out forwards;
  }
  .landing-error {
    color: #ff9999;
    font: 400 13px/1.4 system-ui, -apple-system, sans-serif;
    text-align: center;
    margin-top: 8px;
    animation: fadeInUp 0.4s ease-out forwards;
  }

  .landing-or {
    font: 400 clamp(0.75rem, 2vw, 0.95rem)/1 system-ui, -apple-system, sans-serif;
    color: rgba(255,255,255,0.45);
    text-align: center;
    margin-top: 12px;
    opacity: 0;
    animation: fadeInUp 1.2s ease-out 1.6s forwards;
  }
  .landing-play {
    display: inline-block;
    padding: 10px 24px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 600 14px/1 system-ui, -apple-system, sans-serif;
    text-decoration: none;
    text-align: center;
    margin-top: 12px;
    transition: all 0.2s;
    opacity: 0;
    animation: fadeInUp 1.2s ease-out 1.8s forwards;
    cursor: url('assets/cursor.svg') 1 1, pointer !important;
    letter-spacing: 0.02em;
  }
  @media (min-width: 520px) {
    .landing-play { padding: 12px 28px; font-size: 15px; }
  }
  .landing-play:hover { background: rgba(255,255,255,0.3); }
  .landing-play:active { transform: scale(0.96); }

  /* ── "This is you" label ── */
  .this-is-you {
    position: fixed;
    z-index: 12;
    transform: translate(-50%, -100%);
    font-family: 'Tahiti', serif;
    font-size: clamp(0.7rem, 2vw, 0.9rem);
    color: #ffffff;
    text-align: center;
    text-shadow: 0 1px 2px rgba(0,0,0,0.9);
    background: rgba(0,0,0,0.3);
    padding: 3px 8px 1px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    pointer-events: none;
    opacity: 1;
    transition: opacity 1s;
    line-height: 1.1;
    white-space: nowrap;
  }

  /* ── Signup Bar (used on game page for guests) ── */
  .signup-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 11;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px 20px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    flex-wrap: wrap;
  }
  .signup-label {
    font: 400 clamp(0.75rem, 2vw, 0.9rem)/1.4 system-ui, -apple-system, sans-serif;
    color: rgba(255,255,255,0.8);
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .signup-label em { font-style: italic; }
  .signup-form {
    display: flex;
    gap: 8px;
  }
  .signup-input {
    padding: 8px 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 25px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 400 13px/1 system-ui, -apple-system, sans-serif;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    width: min(200px, 40vw);
  }
  .signup-input::placeholder { color: rgba(255,255,255,0.5); }
  .signup-input:focus {
    border-color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.35);
  }
  .signup-submit {
    padding: 8px 18px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 600 12px/1 system-ui, -apple-system, sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .signup-submit:hover { background: rgba(255,255,255,0.3); }
  .signup-submit:active { transform: scale(0.96); }
  .signup-submit:disabled { opacity: 0.5; }

  /* ── Top signup bar removed ── */
  #guestSignupBar { display: none !important; }

  /* ── Landing signup form removed (keep title + "Enter paradise now") ── */
  .landing-subtitle,
  #signupForm,
  #formMessage,
  .landing-or { display: none !important; }

  /* ── "This is you" indicator removed ── */
  .this-is-you { display: none !important; }

  /* ── Top-right HUD row: music/ambient buttons + clock ── */
  #hud {
    position: fixed;
    top: max(20px, env(safe-area-inset-top, 20px));
    right: max(20px, env(safe-area-inset-right, 20px));
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* ── Real-time clock (opening-screen font) ──
     Shows the user's local time — the same clock the day/night cycle
     is driven from (see dnc_clockToCycleTime in sky-water.js). */
  #clock {
    font-family: 'Tahiti', serif;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    color: #fff;
    letter-spacing: 0.08em;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: none;
  }
  /* Tahiti has no colon glyph (it's blank), so render the separator
     in a playful fallback font that actually has one. */
  #clock .clk-sep {
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', 'Segoe Print', cursive;
    margin: 0 -0.05em;
  }

  /* ── Animations ── */
  /* ── Scene Loading Curtain — white cover that holds until the game
     module + all tracked assets are loaded (lifted by landing.js) ── */
  .scene-curtain {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 1.5s ease-out;
    pointer-events: none;
  }
  .scene-curtain.lifted {
    opacity: 0;
  }
  .curtain-title {
    font-family: 'Tahiti', serif;
    font-size: clamp(2rem, 7vw, 3.6rem);
    color: #c5beb0;
    letter-spacing: 0.08em;
    text-align: center;
    line-height: 1.1;
    padding: 0 24px;
    animation: curtainBreathe 2.6s ease-in-out infinite;
  }
  @keyframes curtainBreathe {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 1; }
  }
  /* Pastel lagoon loading bar — fill driven by landing.js */
  .curtain-bar {
    width: min(260px, 56vw);
    height: 4px;
    margin-top: 26px;
    border-radius: 999px;
    background: rgba(110, 190, 182, 0.18);
    overflow: hidden;
  }
  .curtain-bar-fill {
    width: 0%;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #bfe9e4, #8fd8cf);
    transition: width 0.35s ease;
  }
  .curtain-status {
    margin-top: 12px;
    font: 400 12px/1 system-ui, -apple-system, sans-serif;
    color: #c5beb0;
    letter-spacing: 0.04em;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(105vh) translateX(var(--drift)) rotate(var(--spin)); opacity: 0; }
  }
</style>
</head>
<body>

<!-- White curtain — hides the scene until the game module + assets are loaded.
     landing.js lifts it (asset-idle gate + 15s safety cap). -->
<div class="scene-curtain" id="sceneCurtain">
  <div class="curtain-title">Stranded in Paradise</div>
  <div class="curtain-bar"><div class="curtain-bar-fill" id="curtainBarFill"></div></div>
  <div class="curtain-status" id="curtainStatus">loading paradise&hellip;</div>
</div>

<!-- Landing splash deleted — this is a persistent wallpaper; the root boots straight
     into the scene. The hidden signup form is retained only because landing.js wires
     it on load; it never displays. -->
<div class="landing-overlay" style="display:none">
  <form class="landing-form" id="signupForm">
    <input class="landing-input" id="emailInput" type="email" placeholder="your@email.com" autocomplete="email">
    <button class="landing-submit" id="submitBtn" type="submit">Notify me ☀️</button>
  </form>
  <div id="formMessage"></div>
</div>

<!-- Play transition cover -->
<div class="play-transition" id="playTransition"></div>

<!-- Background Music -->
<audio id="bgMusic" loop preload="auto">
  <source src="assets/audio/ambient.mp3" type="audio/mpeg">
</audio>

<!-- Ambient audio (above/below water). Static <audio> tags — like #bgMusic above —
     so Vite rewrites these source paths to the hashed build assets. Owned by the
     Settings menu (settings.js). (Creating them in JS left the path un-rewritten → 404.) -->
<audio id="ambAbove" loop preload="auto">
  <source src="assets/audio/ambient-above.mp3" type="audio/mpeg">
</audio>
<audio id="ambBelow" loop preload="auto">
  <source src="assets/audio/ambient-below.mp3" type="audio/mpeg">
</audio>

<!-- Top-right HUD (clock; the settings gear is inserted by settings.js).
     Legacy Music/Ambient buttons removed — audio lives in the Settings menu. -->
<div id="hud" style="display:none">
<div id="clock"></div>
</div><!-- /#hud -->

<!-- Landing Page 3D Scene -->
<script type="module" src="src/landing.js"></script>

<!-- Music Player Script removed — audio is now owned solely by the Settings menu (settings.js),
     which controls #bgMusic directly. Keeping a second controller here caused music to keep
     playing after the toggle was switched off. -->

<!-- Real-time clock — same device clock that drives the day/night cycle -->
<script>
(function () {
  var clockEl = document.getElementById('clock');
  function tick() {
    if (!clockEl) return;
    var d = new Date();
    var hh = String(d.getHours()).padStart(2, '0');
    var mm = String(d.getMinutes()).padStart(2, '0');
    clockEl.innerHTML = hh + '<span class="clk-sep">:</span>' + mm;
  }
  tick();
  setInterval(tick, 1000);
})();
</script>

<!-- Play Now — seamless transition to game (no reload) -->
<script type="module">
// Persistent wallpaper — boot straight into the scene on load (no splash, no click).
(function bootWallpaper() {
  // Keep the URL clean: force play mode unless ?dev=1 is explicitly present
  // (this replaces the old ?guest=1 flag).
  if (new URLSearchParams(location.search).get('dev') !== '1') {
    try { sessionStorage.removeItem('sipDev'); } catch (e) {}
  }
  // Inject the game DOM elements main.js expects, then reveal the HUD (clock + gear).
  injectGameDOM();
  var hud = document.getElementById('hud');
  if (hud) hud.style.display = 'flex';
  // Smooth camera hand-off from the landing render to the game (no teleport).
  window._seamlessTransition = true;
  // Import the game entry — shares the state.js singleton (scene/renderer/camera),
  // so the world is already there; main.js just takes over the render loop.
  import('./src/main.js').then(function() {
    window._mainReady = true; // loading-curtain gate: game module fully initialized
  }).catch(function(err) {
    console.error('Failed to load game:', err);
    window._mainReady = true; // fail open — lift the curtain on whatever rendered
  });
})();

function injectGameDOM() {
  // --- Stub DOM elements that main.js references via getElementById ---
  // Dev UI container (hidden — not used in guest/play mode, but main.js checks for it)
  var devUI = document.createElement('div');
  devUI.id = 'devUI';
  devUI.style.display = 'none';
  devUI.innerHTML = [
    '<div id="buildPanel" style="display:none;"></div>',
    '<span id="seedLabel"></span><button id="btnNewSeed"></button>',
    '<div id="cloudToggle" style="display:none;">',
      '<button id="btnRotLeft"></button>',
      '<button id="btnTopDown"><span id="camLabel"></span></button>',
      '<button id="btnRotRight"></button>',
      '<button id="btnBuild"></button>',
      '<select id="weatherSelect"><option value="auto"></option></select>',
      '<select id="moonPhaseSelect"><option value="auto"></option></select>',
      '<div id="dncPanel">',
        '<span id="dncPhaseLabel"></span>',
        '<input type="range" id="dncSlider" min="0" max="600" value="50">',
        '<select id="dncSelect"><option value="auto"></option></select>',
        '<span id="dncTimeLabel"></span>',
      '</div>',
    '</div>',
    '<div id="calibPanelStack" style="display:none;">',
      '<div id="calibHeader"><span id="calibToggle"></span></div>',
      '<div id="calibBody" style="display:none;">',
        '<div id="vpCalibDebug"><div id="vpCalibHeader"><span id="vpCalibToggle"></span></div><div id="vpCalibBody" style="display:none;">',
          '<button id="vpToggle_mobile"><span></span></button><select id="vpDevSel_mobile"></select>',
          '<button id="vpToggle_tablet"><span></span></button><select id="vpDevSel_tablet"></select>',
          '<button id="vpToggle_desktop"><span></span></button><select id="vpDevSel_desktop"></select>',
        '</div></div>',
        '<div id="sunArcDebug"><div id="sunArcHeader"><button id="sunArcHide"></button><span id="sunArcToggle"></span></div><div id="sunArcBody" style="display:none;">',
          '<button id="sacTab_mobile"></button><button id="sacTab_tablet"></button><button id="sacTab_desktop"></button>',
          '<input type="range" id="slAzStart"><span id="sacAzS"></span>',
          '<input type="range" id="slAzEnd"><span id="sacAzE"></span>',
          '<input type="range" id="slElevPeak"><span id="sacElP"></span>',
          '<div id="vpSel_mobile"><select id="devSel_mobile"></select></div>',
          '<div id="vpSel_tablet"><select id="devSel_tablet"></select></div>',
          '<div id="vpSel_desktop"><select id="devSel_desktop"></select></div>',
        '</div></div>',
        '<div id="moonArcDebug"><div id="moonArcHeader"><button id="moonArcHide"></button><span id="moonArcToggle"></span></div><div id="moonArcBody" style="display:none;">',
          '<button id="macTab_mobile"></button><button id="macTab_tablet"></button><button id="macTab_desktop"></button>',
          '<input type="range" id="slMoonAzCenter"><span id="macAzC"></span>',
          '<input type="range" id="slMoonAzDrift"><span id="macAzD"></span>',
          '<input type="range" id="slMoonElevBase"><span id="macElB"></span>',
          '<input type="range" id="slMoonElevArc"><span id="macElA"></span>',
          '<div id="macVpSel_mobile"><select id="macDevSel_mobile"></select></div>',
          '<div id="macVpSel_tablet"><select id="macDevSel_tablet"></select></div>',
          '<div id="macVpSel_desktop"><select id="macDevSel_desktop"></select></div>',
        '</div></div>',
        '<div id="causticDebug"><div id="causticDbgHeader"><span id="causticDbgToggle"></span></div><div id="causticDbgBody" style="display:none;"><input type="range" id="causticScaleRange" min="0.5" max="4.0" step="0.1" value="3.0"><span id="causticScaleVal">3.0</span></div></div>',

        '<div id="camDebug"><div id="camDbgHeader"><span id="camDbgToggle"></span></div><div id="camDbgBody" style="display:none;">',
          '<input type="range" id="camDbgZoom"><span id="camDbgZoomVal"></span>',
          '<input type="range" id="camDbgPosX"><input type="range" id="camDbgPosZ"><span id="camDbgPosVal"></span>',
          '<input type="range" id="camDbgLookY"><span id="camDbgLookYVal"></span>',
          '<div id="camDbgLive"></div>',
        '</div></div>',
      '</div>',
    '</div>',
  ].join('');
  document.body.appendChild(devUI);

  // Gameplay UI container
  var gameUI = document.createElement('div');
  gameUI.id = 'gameUI';
  gameUI.style.display = 'none';
  document.body.appendChild(gameUI);

  // Mode toggle button (hidden for guests)
  var modeToggle = document.createElement('button');
  modeToggle.id = 'modeToggle';
  modeToggle.style.display = 'none';
  document.body.appendChild(modeToggle);

  // Hide Dev UI button (hidden — dev only)
  var hideDevUI = document.createElement('button');
  hideDevUI.id = 'hideDevUI';
  hideDevUI.style.display = 'none';
  document.body.appendChild(hideDevUI);

  // Player toggle button (hidden — dev only)
  var playerToggle = document.createElement('button');
  playerToggle.id = 'playerToggle';
  playerToggle.style.display = 'none';
  document.body.appendChild(playerToggle);

  // Guest signup bar (matches game.html structure)
  var bar = document.createElement('div');
  bar.className = 'signup-bar';
  bar.id = 'guestSignupBar';
  bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 20px;background:rgba(0,0,0,0.3);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);flex-wrap:wrap;transform:translateY(-100%);transition:transform 0.6s cubic-bezier(0.22,1,0.36,1);';
  bar.innerHTML = [
    '<p class="signup-label">Get a message in a bottle when it\'s ready:</p>',
    '<form class="signup-form" id="signupBarForm" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;">',
      '<input class="signup-input" id="barEmailInput" type="email" placeholder="your@email.com" required autocomplete="email" style="padding:8px 14px;border:2px solid rgba(255,255,255,0.4);border-radius:25px;background:rgba(0,0,0,0.25);backdrop-filter:blur(12px);color:#fff;font:400 13px/1 system-ui,sans-serif;text-align:left;outline:none;width:min(200px,40vw);">',
      '<span id="wishWrap" style="display:inline-flex;position:relative;overflow:hidden;border-radius:25px;">',
        '<button id="wishToggle" type="button" style="padding:8px 14px;border:2px dotted rgba(255,255,255,0.6);border-radius:25px;background:rgba(255,255,255,0.15);backdrop-filter:blur(12px);color:#fff;font:600 13px/1 system-ui,sans-serif;cursor:pointer;transition:all 0.35s;white-space:nowrap;max-width:160px;overflow:hidden;box-sizing:border-box;">Add a wish</button>',
        '<input id="wishInput" type="text" placeholder="I wish I could..." maxlength="200" autocomplete="off" style="padding:8px 14px;border:0;border-radius:25px;background:rgba(0,0,0,0.25);backdrop-filter:blur(12px);color:#fff;font:400 13px/1 system-ui,sans-serif;outline:none;max-width:0;opacity:0;overflow:hidden;padding-left:0;padding-right:0;transition:max-width 0.4s cubic-bezier(0.22,1,0.36,1),opacity 0.3s ease 0.1s,padding 0.4s ease,border-width 0.35s ease;">',
        '<div id="wishDropdown" style="position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%) translateY(-4px);min-width:240px;background:rgba(10,10,20,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.2);border-radius:14px;padding:6px 0;z-index:300;opacity:0;pointer-events:none;transition:opacity 0.2s ease,transform 0.2s ease;box-shadow:0 8px 32px rgba(0,0,0,0.4);"></div>',
      '</span>',
      '<span id="bugWrap" style="display:inline-flex;position:relative;overflow:hidden;border-radius:25px;">',
        '<button id="bugToggle" type="button" style="padding:8px 14px;border:2px dotted rgba(255,255,255,0.6);border-radius:25px;background:rgba(255,255,255,0.15);backdrop-filter:blur(12px);color:#fff;font:600 13px/1 system-ui,sans-serif;cursor:pointer;transition:all 0.35s;white-space:nowrap;max-width:160px;overflow:hidden;box-sizing:border-box;">Report a bug</button>',
        '<input id="bugInput" type="text" placeholder="Describe the bug..." maxlength="300" autocomplete="off" style="padding:8px 14px;border:0;border-radius:25px;background:rgba(0,0,0,0.25);backdrop-filter:blur(12px);color:#fff;font:400 13px/1 system-ui,sans-serif;outline:none;max-width:0;opacity:0;overflow:hidden;padding-left:0;padding-right:0;transition:max-width 0.4s cubic-bezier(0.22,1,0.36,1),opacity 0.3s ease 0.1s,padding 0.4s ease,border-width 0.35s ease;">',
      '</span>',
      '<span style="width:1px;height:20px;background:rgba(255,255,255,0.3);flex-shrink:0;"></span>',
      '<button id="sendBtn" type="submit" style="padding:8px 14px;border:2px solid rgba(255,255,255,0.6);border-radius:25px;background:rgba(255,255,255,0.15);backdrop-filter:blur(12px);color:#fff;font:600 13px/1 system-ui,sans-serif;cursor:pointer;transition:all 0.2s;white-space:nowrap;box-sizing:border-box;display:inline-flex;align-items:center;justify-content:center;">Send \u2728</button>',
    '</form>',
    '<div id="barFormMessage"></div>',
  ].join('');
  document.body.appendChild(bar);
  // Slide in
  bar.offsetHeight; // force layout
  bar.style.display = 'flex';
  setTimeout(function() { bar.style.transform = 'translateY(0)'; }, 50);

  // Ambient audio elements are now static <audio> tags in index.html (next to
  // #bgMusic) so Vite rewrites their source paths to the hashed build assets.
  // Creating them here via innerHTML left 'assets/audio/...' un-rewritten → 404.

  // Legacy Music/Ambient button cluster removed — audio is owned by the
  // Settings menu (settings.js).

  // Run game page inline scripts (guest signup, wish, ambient audio, notification, etc.)
  runGameScripts();
}

function runGameScripts() {
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw97pWaHISz1VdJsQAp6zlLDM1tWnsxQkNsPblod1zah-oHk-c9yMsbsy8PwZ3ppcEITQ/exec';

  // Legacy ambient-audio controller removed — the Settings menu (settings.js) owns all audio.

  // --- Task notification system ---
  window._notify = function(msg) {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1108.73, ctx.currentTime + 0.08);
      osc.frequency.setValueAtTime(1318.51, ctx.currentTime + 0.16);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.4);
    } catch(e) {}
    var toast = document.getElementById('taskToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'taskToast';
      toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(76,175,80,0.95);color:#fff;padding:12px 24px;border-radius:12px;font:600 14px/1 system-ui,sans-serif;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.3s,transform 0.3s;backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,0.3);';
      document.body.appendChild(toast);
    }
    toast.textContent = msg || 'Task complete';
    toast.style.opacity = '1';
    toast.style.transform = 'translateX(-50%) translateY(0)';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(function() {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) translateY(-10px)';
    }, 3000);
  };

  // --- Guest signup bar ---
  var barForm = document.getElementById('signupBarForm');
  var barEmail = document.getElementById('barEmailInput');
  var barWishWrap = document.getElementById('wishWrap');
  var barWishToggle = document.getElementById('wishToggle');
  var barWishInput = document.getElementById('wishInput');
  var barSendBtn = document.getElementById('sendBtn');
  var barMsg = document.getElementById('barFormMessage');
  var barEl = document.getElementById('guestSignupBar');

  // "Add a Wish" → morph button into input + show dropdown
  var barWishDropdown = document.getElementById('wishDropdown');
  if (barWishToggle) {
    barWishToggle.addEventListener('click', function() {
      barWishToggle.style.cssText += 'opacity:0;max-width:0;padding:0;border-width:0;pointer-events:none;';
      var wi = barWishInput;
      wi.style.maxWidth = 'min(220px, 35vw)';
      wi.style.opacity = '1';
      wi.style.padding = '8px 14px';
      wi.style.borderWidth = '2px';
      wi.style.border = '2px solid rgba(255,255,255,0.4)';
      // Allow overflow for dropdown
      barWishWrap.style.overflow = 'visible';
      setTimeout(function() {
        wi.focus();
        if (barWishDropdown) {
          barWishDropdown.style.opacity = '1';
          barWishDropdown.style.pointerEvents = 'auto';
          barWishDropdown.style.transform = 'translateX(-50%) translateY(0)';
        }
      }, 400);
    });
  }

  // Populate and handle wish dropdown
  if (barWishDropdown) {
    var wishes = [
      '\uD83C\uDFE0 Build a treehouse',
      '\uD83D\uDC2C Swim with dolphins',
      '\uD83D\uDC8E Find buried treasure',
      '\uD83C\uDFDD\uFE0F Live on this island forever',
      '\uD83E\uDD9C Tame a parrot',
      '\uD83C\uDF0A Surf a tsunami',
      '\uD83E\uDD80 Befriend a coconut crab',
      '\uD83E\uDDDC\u200D\u2640\uFE0F Make love to mermaids',
    ];
    var itemStyle = 'padding:8px 16px;color:rgba(255,255,255,0.8);font:400 12px/1.4 system-ui,sans-serif;cursor:pointer;transition:background 0.15s,color 0.15s;white-space:nowrap;';
    barWishDropdown.innerHTML = wishes.map(function(w) {
      return '<div class="wish-dropdown-item" style="' + itemStyle + '">' + w + '</div>';
    }).join('');

    barWishDropdown.addEventListener('click', function(e) {
      var item = e.target.closest('.wish-dropdown-item');
      if (!item) return;
      var text = item.textContent.replace(/^.+?\s/, '');
      barWishInput.value = 'I wish I could ' + text.charAt(0).toLowerCase() + text.slice(1);
      barWishDropdown.style.opacity = '0';
      barWishDropdown.style.pointerEvents = 'none';
      barWishDropdown.style.transform = 'translateX(-50%) translateY(-4px)';
      barWishInput.focus();
    });

    // Add hover styles via JS
    barWishDropdown.addEventListener('mouseover', function(e) {
      var item = e.target.closest('.wish-dropdown-item');
      if (item) { item.style.background = 'rgba(255,255,255,0.12)'; item.style.color = '#fff'; }
    });
    barWishDropdown.addEventListener('mouseout', function(e) {
      var item = e.target.closest('.wish-dropdown-item');
      if (item) { item.style.background = ''; item.style.color = 'rgba(255,255,255,0.8)'; }
    });

    // Close dropdown + collapse back to button when clicking outside
    document.addEventListener('click', function(e) {
      if (!barWishWrap.contains(e.target)) {
        barWishDropdown.style.opacity = '0';
        barWishDropdown.style.pointerEvents = 'none';
        barWishDropdown.style.transform = 'translateX(-50%) translateY(-4px)';
        if (barWishInput.style.opacity === '1' && !barWishInput.value) {
          barWishInput.style.maxWidth = '0';
          barWishInput.style.opacity = '0';
          barWishInput.style.padding = '0';
          barWishInput.style.paddingLeft = '0';
          barWishInput.style.paddingRight = '0';
          barWishInput.style.borderWidth = '0';
          barWishWrap.style.overflow = 'hidden';
          barWishToggle.style.cssText = barWishToggle.style.cssText.replace(/opacity:0;max-width:0;padding:0;border-width:0;pointer-events:none;/g, '');
          barWishToggle.style.opacity = '1';
          barWishToggle.style.maxWidth = '160px';
          barWishToggle.style.padding = '8px 14px';
          barWishToggle.style.borderWidth = '2px';
          barWishToggle.style.pointerEvents = 'auto';
        }
      }
    });

    // Re-open on focus if empty
    barWishInput.addEventListener('focus', function() {
      if (!barWishInput.value) {
        barWishDropdown.style.opacity = '1';
        barWishDropdown.style.pointerEvents = 'auto';
        barWishDropdown.style.transform = 'translateX(-50%) translateY(0)';
      }
    });

    // Close on typing
    barWishInput.addEventListener('input', function() {
      barWishDropdown.style.opacity = '0';
      barWishDropdown.style.pointerEvents = 'none';
      barWishDropdown.style.transform = 'translateX(-50%) translateY(-4px)';
    });
  }

  // "Report a Bug" → morph button into input
  var barBugWrap = document.getElementById('bugWrap');
  var barBugToggle = document.getElementById('bugToggle');
  var barBugInput = document.getElementById('bugInput');
  if (barBugToggle) {
    barBugToggle.addEventListener('click', function() {
      barBugToggle.style.cssText += 'opacity:0;max-width:0;padding:0;border-width:0;pointer-events:none;';
      var bi = barBugInput;
      bi.style.maxWidth = 'min(260px, 45vw)';
      bi.style.opacity = '1';
      bi.style.padding = '8px 14px';
      bi.style.borderWidth = '2px';
      bi.style.border = '2px solid rgba(255,255,255,0.4)';
      barBugWrap.style.overflow = 'visible';
      setTimeout(function() { bi.focus(); }, 400);
    });

    // Close bug input when clicking outside (if empty)
    document.addEventListener('click', function(e) {
      if (!barBugWrap.contains(e.target) && barBugInput.style.opacity === '1' && !barBugInput.value) {
        barBugInput.style.maxWidth = '0';
        barBugInput.style.opacity = '0';
        barBugInput.style.padding = '0';
        barBugInput.style.paddingLeft = '0';
        barBugInput.style.paddingRight = '0';
        barBugInput.style.borderWidth = '0';
        barBugWrap.style.overflow = 'hidden';
        barBugToggle.style.cssText = barBugToggle.style.cssText.replace(/opacity:0;max-width:0;padding:0;border-width:0;pointer-events:none;/g, '');
        barBugToggle.style.opacity = '1';
        barBugToggle.style.maxWidth = '160px';
        barBugToggle.style.padding = '8px 14px';
        barBugToggle.style.borderWidth = '2px';
        barBugToggle.style.pointerEvents = 'auto';
      }
    });
  }

  // Send: submit email + optional wish + optional bug
  if (barForm) {
    barForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = barEmail.value.trim();
      if (!email || !email.includes('@') || !email.includes('.')) {
        barEmail.style.borderColor = '#ff9999';
        barEmail.setAttribute('placeholder', 'email required');
        setTimeout(function() {
          barEmail.style.borderColor = '';
          barEmail.setAttribute('placeholder', 'your@email.com');
        }, 2000);
        return;
      }
      var wish = barWishInput.value.trim() || 'empty';
      var bug  = barBugInput ? barBugInput.value.trim() || 'empty' : 'empty';
      barSendBtn.disabled = true;
      barSendBtn.textContent = 'Sending';
      barSendBtn.style.cssText += 'pointer-events:none;opacity:0.7;';
      // Add spinner via pseudo-element
      if (!document.getElementById('sendSpinStyle')) {
        var st = document.createElement('style');
        st.id = 'sendSpinStyle';
        st.textContent = '@keyframes spin{to{transform:rotate(360deg)}}#sendBtn.sending::after{content:"";display:inline-block;width:12px;height:12px;margin-left:6px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}';
        document.head.appendChild(st);
      }
      barSendBtn.classList.add('sending');
      if (barMsg) barMsg.innerHTML = '';
      try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, wish: wish, bug: bug }) });
        // Build conditional success message
        var parts = [];
        parts.push('We\u2019ve received your interest');
        if (wish !== 'empty') parts.push('your wish');
        if (bug !== 'empty') parts.push('your bug report');
        var msg = parts.length === 1 ? parts[0] : parts.slice(0, -1).join(', ') + ' and ' + parts[parts.length - 1];
        msg += '. Thank you! \uD83C\uDF34';

        barForm.style.opacity = '0';
        barForm.style.transition = 'opacity 0.4s ease';
        barForm.style.pointerEvents = 'none';
        var label = barEl.querySelector('.signup-label');
        if (label) label.style.display = 'none';
        // Insert centered success message
        var successEl = document.createElement('div');
        successEl.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font:600 15px/1.4 system-ui,sans-serif;text-align:center;opacity:0;transition:opacity 0.5s ease 0.2s;padding:0 20px;';
        successEl.textContent = msg;
        barEl.appendChild(successEl);
        setTimeout(function() { successEl.style.opacity = '1'; }, 50);
        if (barMsg) barMsg.style.display = 'none';
        barEl.style.transition = 'transform 0.6s cubic-bezier(0.55,0,1,0.45) 4s';
        barEl.style.transform = 'translateY(-100%)';
      } catch(err) {
        barSendBtn.disabled = false;
        barSendBtn.textContent = 'Send \u2728';
        barSendBtn.classList.remove('sending');
        barSendBtn.style.pointerEvents = '';
        barSendBtn.style.opacity = '';
      }
    });
  }
}
</script>

</body>
