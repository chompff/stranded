<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stranded in Paradise</title>
<meta name="description" content="A tropical island builder game. Get notified when it's playable.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: url('/assets/cursor-Cp-NsyKv.svg') 1 1, auto !important; }
  @font-face { font-family: 'Tahiti'; src: url('/assets/tahiti-8gB10FcK.otf') format('opentype'); }
  html, body { overflow: hidden; background: #000; width: 100%; height: 100%; }
  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

  /* ── Landing Overlay ── */
  .landing-overlay {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 62vh;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    padding: 20px;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
  }
  .landing-overlay.exiting {
    transform: translateY(-100%);
    opacity: 0;
  }
  .landing-overlay > * { pointer-events: auto; }

  /* ── Play transition cover ── */
  .play-transition {
    position: fixed;
    inset: 0;
    z-index: 998;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .play-transition.active {
    opacity: 1;
  }

  .landing-title {
    font-family: 'Tahiti', serif;
    font-size: clamp(2.8rem, 10vw, 5.5rem);
    color: #fff;
    text-align: center;
    text-shadow:
      0 2px 20px rgba(0,0,0,0.25),
      0 0 50px rgba(0,0,0,0.12);
    letter-spacing: 0.08em;
    line-height: 1.1;
    width: min(340px, 78vw);
    opacity: 0;
    animation: fadeInUp 1.5s ease-out 0.3s forwards;
  }
  @media (min-width: 520px) {
    .landing-title { width: auto; max-width: 90vw; }
    .mobile-break { display: none; }
  }

  .landing-subtitle {
    font: 400 clamp(0.85rem, 2.5vw, 1.2rem)/1.4 system-ui, -apple-system, sans-serif;
    color: rgba(255,255,255,0.8);
    text-align: center;
    margin-top: 20px;
    text-shadow: 0 1px 10px rgba(0,0,0,0.5);
    opacity: 0;
    animation: fadeInUp 1.2s ease-out 0.8s forwards;
  }

  /* ── Email Form ── */
  .landing-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
    width: min(340px, 78vw);
    opacity: 0;
    animation: fadeInUp 1.2s ease-out 1.2s forwards;
  }
  @media (min-width: 520px) {
    .landing-form { flex-direction: row; width: min(400px, 90vw); gap: 10px; }
  }

  .landing-input {
    flex: 1;
    padding: 10px 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 25px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 400 14px/1 system-ui, -apple-system, sans-serif;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    cursor: url('/assets/cursor-Cp-NsyKv.svg') 1 1, text !important;
  }
  @media (min-width: 520px) {
    .landing-input { padding: 12px 18px; font-size: 15px; }
  }
  .landing-input::placeholder { color: rgba(255,255,255,0.5); }
  .landing-input:focus {
    border-color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.35);
  }

  .landing-submit {
    padding: 10px 20px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 600 13px/1 system-ui, -apple-system, sans-serif;
    cursor: url('/assets/cursor-Cp-NsyKv.svg') 1 1, pointer !important;
    transition: all 0.2s;
    white-space: nowrap;
  }
  @media (min-width: 520px) {
    .landing-submit { padding: 12px 24px; font-size: 14px; }
  }
  .landing-submit:hover { background: rgba(255,255,255,0.3); }
  .landing-submit:active { transform: scale(0.96); }
  .landing-submit:disabled {
    opacity: 0.5;
    cursor: url('/assets/cursor-Cp-NsyKv.svg') 1 1, not-allowed !important;
  }

  /* ── Success / Error Messages ── */
  .landing-success {
    margin-top: 20px;
    padding: 14px 24px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 25px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 400 15px/1.4 system-ui, -apple-system, sans-serif;
    text-align: center;
    animation: fadeInUp 0.6s ease-out forwards;
  }
  .landing-error {
    color: #ff9999;
    font: 400 13px/1.4 system-ui, -apple-system, sans-serif;
    text-align: center;
    margin-top: 8px;
    animation: fadeInUp 0.4s ease-out forwards;
  }

  .landing-or {
    font: 400 clamp(0.75rem, 2vw, 0.95rem)/1 system-ui, -apple-system, sans-serif;
    color: rgba(255,255,255,0.45);
    text-align: center;
    margin-top: 12px;
    opacity: 0;
    animation: fadeInUp 1.2s ease-out 1.6s forwards;
  }
  .landing-play {
    display: inline-block;
    padding: 10px 24px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 600 14px/1 system-ui, -apple-system, sans-serif;
    text-decoration: none;
    text-align: center;
    margin-top: 12px;
    transition: all 0.2s;
    opacity: 0;
    animation: fadeInUp 1.2s ease-out 1.8s forwards;
    cursor: url('/assets/cursor-Cp-NsyKv.svg') 1 1, pointer !important;
    letter-spacing: 0.02em;
  }
  @media (min-width: 520px) {
    .landing-play { padding: 12px 28px; font-size: 15px; }
  }
  .landing-play:hover { background: rgba(255,255,255,0.3); }
  .landing-play:active { transform: scale(0.96); }

  /* ── "This is you" label ── */
  .this-is-you {
    position: fixed;
    z-index: 12;
    transform: translate(-50%, -100%);
    font-family: 'Tahiti', serif;
    font-size: clamp(0.7rem, 2vw, 0.9rem);
    color: #ffffff;
    text-align: center;
    text-shadow: 0 1px 2px rgba(0,0,0,0.9);
    background: rgba(0,0,0,0.3);
    padding: 3px 8px 1px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    pointer-events: none;
    opacity: 1;
    transition: opacity 1s;
    line-height: 1.1;
    white-space: nowrap;
  }

  /* ── Signup Bar (used on game page for guests) ── */
  .signup-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 11;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px 20px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    flex-wrap: wrap;
  }
  .signup-label {
    font: 400 clamp(0.75rem, 2vw, 0.9rem)/1.4 system-ui, -apple-system, sans-serif;
    color: rgba(255,255,255,0.8);
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .signup-label em { font-style: italic; }
  .signup-form {
    display: flex;
    gap: 8px;
  }
  .signup-input {
    padding: 8px 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 25px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 400 13px/1 system-ui, -apple-system, sans-serif;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    width: min(200px, 40vw);
  }
  .signup-input::placeholder { color: rgba(255,255,255,0.5); }
  .signup-input:focus {
    border-color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.35);
  }
  .signup-submit {
    padding: 8px 18px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 25px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #fff;
    font: 600 12px/1 system-ui, -apple-system, sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .signup-submit:hover { background: rgba(255,255,255,0.3); }
  .signup-submit:active { transform: scale(0.96); }
  .signup-submit:disabled { opacity: 0.5; }

  /* ── Music UI ── */
  .music-ui {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom, 20px));
    left: max(20px, env(safe-area-inset-left, 20px));
    z-index: 100;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .music-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 16px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 20px;
    background: rgba(0,0,0,0.3);
    color: #fff;
    font: 600 13px/1 system-ui, sans-serif;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    cursor: url('/assets/cursor-Cp-NsyKv.svg') 1 1, pointer !important;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }
  .music-btn:hover { background: rgba(0,0,0,0.5); }
  .music-btn:active { transform: scale(0.95); }
  .music-btn.playing {
    background: rgba(255,255,255,0.85);
    color: #1a1a2e;
    border-color: #fff;
  }
  .eq-bars { display: inline-flex; align-items: flex-end; gap: 2px; height: 14px; }
  .eq-bar {
    width: 3px;
    background: currentColor;
    border-radius: 1px;
    transition: height 0.15s ease;
  }
  .music-btn:not(.playing) .eq-bar { height: 4px !important; }
  .music-btn.playing .eq-bar { animation: eqBounce 1s ease-in-out infinite alternate; }
  .music-btn.playing .eq-bar:nth-child(1) { animation-duration: 0.8s; animation-delay: -0.2s; }
  .music-btn.playing .eq-bar:nth-child(2) { animation-duration: 1.1s; animation-delay: -0.5s; }
  .music-btn.playing .eq-bar:nth-child(3) { animation-duration: 0.9s; animation-delay: -0.8s; }
  .music-btn.playing .eq-bar:nth-child(4) { animation-duration: 1.2s; animation-delay: -0.3s; }
  @keyframes eqBounce {
    0%   { height: 4px; }
    50%  { height: 14px; }
    100% { height: 6px; }
  }

  /* ── Animations ── */
  /* ── Scene Loading Curtain ── */
  .scene-curtain {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #000;
    transition: opacity 1.5s ease-out;
    pointer-events: none;
  }
  .scene-curtain.lifted {
    opacity: 0;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(105vh) translateX(var(--drift)) rotate(var(--spin)); opacity: 0; }
  }
</style>
  <script type="module" crossorigin src="/assets/main-BXFhJFVD.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/terrain-eXjFTk1i.js">
</head>
<body>

<!-- Black curtain — hides scene until first frame renders -->
<div class="scene-curtain" id="sceneCurtain"></div>

<!-- Landing Overlay -->
<div class="landing-overlay">
  <h1 class="landing-title">STRANDED<br class="mobile-break"> IN PARADISE</h1>
  <p class="landing-subtitle">Get a message in a bottle when it's ready:</p>
  <form class="landing-form" id="signupForm">
    <input class="landing-input" id="emailInput" type="email" placeholder="your@email.com" required autocomplete="email">
    <button class="landing-submit" id="submitBtn" type="submit">Notify me ☀️</button>
  </form>
  <div id="formMessage"></div>
  <p class="landing-or">or</p>
  <a class="landing-play" id="playNowBtn" href="game.html?guest=1">Enter paradise now 🌴</a>
</div>

<!-- Play transition cover -->
<div class="play-transition" id="playTransition"></div>

<!-- Background Music -->
<audio id="bgMusic" loop preload="auto">
  <source src="/assets/ambient-D9Dzqtft.mp3" type="audio/mpeg">
</audio>

<!-- Music UI -->
<div class="music-ui" id="musicUI">
  <button class="music-btn" id="playBtn" title="Play/Pause" aria-label="Toggle music">
    <span class="eq-bars">
      <span class="eq-bar" style="height:4px"></span>
      <span class="eq-bar" style="height:4px"></span>
      <span class="eq-bar" style="height:4px"></span>
      <span class="eq-bar" style="height:4px"></span>
    </span>
    Music
  </button>
</div>

<!-- Landing Page 3D Scene -->

<!-- Music Player Script -->
<script>
const audio = document.getElementById('bgMusic');
const playBtn = document.getElementById('playBtn');
audio.volume = 0.6;
audio.loop = true;
let playing = false;
let toggling = false;

function toggle() {
  if (toggling) return;
  toggling = true;
  setTimeout(() => toggling = false, 300);
  if (!playing) {
    audio.play().then(() => {
      playing = true;
      playBtn.classList.add('playing');
    }).catch(() => {
      setTimeout(() => {
        audio.play().then(() => {
          playing = true;
          playBtn.classList.add('playing');
        }).catch(() => {});
      }, 100);
    });
  } else {
    playing = false;
    playBtn.classList.remove('playing');
    audio.pause();
  }
}

playBtn.addEventListener('pointerdown', toggle);
playBtn.addEventListener('click', (e) => { e.preventDefault(); toggle(); });
playBtn.addEventListener('touchend', (e) => { e.preventDefault(); toggle(); });

// Auto-start music on first user interaction
function autoStartMusic() {
  if (!playing) {
    audio.play().then(() => {
      playing = true;
      playBtn.classList.add('playing');
    }).catch(() => {});
  }
  window.removeEventListener('pointerdown', autoStartMusic);
  window.removeEventListener('keydown', autoStartMusic);
  window.removeEventListener('touchstart', autoStartMusic);
}
window.addEventListener('pointerdown', autoStartMusic, { once: false });
window.addEventListener('keydown', autoStartMusic, { once: false });
window.addEventListener('touchstart', autoStartMusic, { once: false });
</script>

<!-- Play Now — seamless transition to game (no reload) -->

</body>
</html>
